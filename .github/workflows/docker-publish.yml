name: Build, Publish, and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push the Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sharppay-backend:latest

      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          # This grabs the secret you saved in GitHub Settings
          NEON_DB_PASSWORD: ${{ secrets.NEON_DB_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          # This passes the environment variable into the SSH session
          envs: NEON_DB_PASSWORD
          script: |
            # Export it so the bash script can read it
            export NEON_DB_PASSWORD=$NEON_DB_PASSWORD
            
            chmod +x /root/sharppay/deploy_sharppay.sh
            /root/sharppay/deploy_sharppay.sh